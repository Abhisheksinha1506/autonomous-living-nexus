name: Handle Delayed Pull Requests

# Runs every 6 hours and merges any "Major Evolution" PRs
# that have been open for at least 48 hours — the contemplation period.

on:
  schedule:
    - cron: '30 */6 * * *'   # Every 6 hours (offset from main workflow)
  workflow_dispatch:

jobs:
  handle-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyGithub python-dateutil requests

      - name: Process delayed PRs
        env:
          PAT:               ${{ secrets.PAT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python << 'EOF'
          import os, datetime
          from github import Github
          from dateutil import parser as dateparser

          TOKEN     = os.getenv("PAT") or os.getenv("GITHUB_TOKEN")
          REPO_NAME = os.getenv("GITHUB_REPOSITORY")
          THRESHOLD = datetime.timedelta(hours=48)

          if not TOKEN or not REPO_NAME:
              print("⚠️  Missing token or repo — aborting")
              exit(0)

          g    = Github(TOKEN)
          repo = g.get_repo(REPO_NAME)
          now  = datetime.datetime.utcnow().replace(tzinfo=datetime.timezone.utc)

          open_prs = list(repo.get_pulls(state="open"))
          print(f"Found {len(open_prs)} open PR(s)")

          for pr in open_prs:
              age = now - pr.created_at
              is_evolution = (
                  pr.head.ref.startswith("evolution/") or
                  "Major Evolution" in pr.title
              )

              print(f"PR #{pr.number}: '{pr.title}' | age={age} | evolution={is_evolution}")

              if not is_evolution:
                  print(f"  → Skipping (not a Major Evolution PR)")
                  continue

              if age < THRESHOLD:
                  remaining = THRESHOLD - age
                  hrs = int(remaining.total_seconds() // 3600)
                  mins = int((remaining.total_seconds() % 3600) // 60)
                  print(f"  → Still in contemplation period ({hrs}h {mins}m remaining)")
                  pr.create_issue_comment(
                      f"🕰️ **Contemplation period in progress.**\n\n"
                      f"This Major Evolution PR will be automatically merged in "
                      f"approximately **{hrs} hours {mins} minutes**.\n\n"
                      f"*Feel free to comment your reflections before it merges.*"
                  )
                  continue

              # Attempt merge
              try:
                  result = pr.merge(
                      commit_title=f"🌌 {pr.title} [auto-merged after 48h contemplation]",
                      commit_message=(
                          f"This Major Evolution PR was automatically merged after "
                          f"the 48-hour contemplation period.\n\n"
                          f"Opened: {pr.created_at.isoformat()}\n"
                          f"Merged: {now.isoformat()}"
                      ),
                      merge_method="squash",
                  )
                  print(f"  ✅ Merged PR #{pr.number}: {result.merged}")

                  # Delete the evolution branch
                  try:
                      ref = repo.get_git_ref(f"heads/{pr.head.ref}")
                      ref.delete()
                      print(f"  ✅ Deleted branch: {pr.head.ref}")
                  except Exception as e:
                      print(f"  ⚠️  Could not delete branch: {e}")

              except Exception as e:
                  print(f"  ❌ Merge failed for PR #{pr.number}: {e}")
                  pr.create_issue_comment(
                      f"⚠️ **Auto-merge failed.**\n\n"
                      f"The contemplation period has ended but the PR could not be "
                      f"merged automatically (possibly a conflict). "
                      f"Please review and merge manually.\n\n"
                      f"Error: `{e}`"
                  )

          print("✅ Delayed PR handler complete")
          EOF