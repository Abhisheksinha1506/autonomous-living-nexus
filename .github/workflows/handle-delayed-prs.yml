name: Handle Delayed Pull Requests

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC — checks for PRs older than 48hrs
  workflow_dispatch:

permissions:
  contents:      write
  pull-requests: write
  issues:        write

jobs:
  handle-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-merge aged Evolution PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
            });

            const now = new Date();
            let merged = 0, skipped = 0;

            for (const pr of prs) {
              const isEvolution = pr.title.includes('Major Evolution');
              if (!isEvolution) { skipped++; continue; }

              const created   = new Date(pr.created_at);
              const hoursOpen = (now - created) / (1000 * 60 * 60);

              console.log(`PR #${pr.number} "${pr.title}" — open ${hoursOpen.toFixed(1)} hrs`);

              if (hoursOpen < 48) {
                console.log(`  ⏳ Contemplation period not yet complete (need 48hrs)`);
                skipped++;
                continue;
              }

              // Post a closing comment
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                body: [
                  '🌌 **The contemplation period has passed.**',
                  '',
                  `After ${Math.floor(hoursOpen)} hours of open reflection, the Nexus integrates this evolution.`,
                  '',
                  '*Auto-merged by the Living Nexus handle-delayed-prs workflow.*',
                ].join('\n'),
              });

              // Attempt merge
              try {
                await github.rest.pulls.merge({
                  owner:         context.repo.owner,
                  repo:          context.repo.repo,
                  pull_number:   pr.number,
                  merge_method:  'squash',
                  commit_title:  `🌌 ${pr.title} — integrated after contemplation`,
                  commit_message: `Merged after ${Math.floor(hoursOpen)} hours of contemplation.`,
                });
                console.log(`  ✅ PR #${pr.number} merged`);
                merged++;
              } catch (e) {
                console.log(`  ⚠️  Could not auto-merge PR #${pr.number}: ${e.message}`);
                // Add a label to flag it for manual attention
                try {
                  await github.rest.issues.addLabels({
                    owner:        context.repo.owner,
                    repo:         context.repo.repo,
                    issue_number: pr.number,
                    labels:       ['needs-manual-merge'],
                  });
                } catch (_) {}
                skipped++;
              }
            }

            console.log(`\nDone. Merged: ${merged} | Skipped/ineligible: ${skipped}`);