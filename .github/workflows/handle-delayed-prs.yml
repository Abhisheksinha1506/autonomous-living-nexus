name: Handle Delayed Pull Requests

# SAFETY NOTES:
# - Runs every 6 hours to check for PRs that have completed their 48-hour delay period
# - Automatically merges PRs with no conflicts to maintain autonomous evolution flow
# - Closes PRs with conflicts to prevent repository stagnation
# - Uses least privilege permissions for pull request operations only

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (4 times daily)
  workflow_dispatch:  # Manual trigger for testing or immediate processing

jobs:
  handle-delayed-prs:
    runs-on: ubuntu-latest
    # Least privilege permissions - only what's needed for PR operations
    permissions:
      contents: write        # Required for merging pull requests
      pull-requests: write   # Required for reading and managing pull requests

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Use AUTONOMOUS_PAT if available, otherwise GITHUB_TOKEN
        token: ${{ secrets.AUTONOMOUS_PAT || secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyGithub==2.3.0 python-dateutil==2.8.2

    - name: Process Delayed Pull Requests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        REPOSITORY_OWNER: ${{ github.repository_owner }}
        REPOSITORY_NAME: ${{ github.event.repository.name }}
      run: |
        python << 'EOF'
        import os
        import json
        logging
        from datetime import datetime, timedelta
        from github import Github
        from dateutil.parser import parse as parse_date

        # Configure logging
        logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')
        logger = logging.getLogger(__name__)

        def handle_delayed_prs():
            """Process PRs with delay-48h label that are older than 48 hours"""
            
            # Initialize GitHub client
            github_token = os.getenv('GITHUB_TOKEN')
            github_repository = os.getenv('GITHUB_REPOSITORY')
            
            if not all([github_token, github_repository]):
                logger.error("Missing required environment variables")
                return
            
            g = Github(github_token)
            repo = g.get_repo(github_repository)
            
            logger.info(f"Processing delayed PRs for repository: {github_repository}")
            
            # Check rate limits before processing
            try:
                rate_limit = g.get_rate_limit()
                core_limit = rate_limit.core
                logger.info(f"API Rate Limit: {core_limit.remaining}/{core_limit.limit}")
                
                if core_limit.remaining < 100:
                    logger.warning(f"Rate limit too low ({core_limit.remaining}), skipping PR processing")
                    return
                    
            except Exception as e:
                logger.warning(f"Could not check rate limits: {e}")
            
            # Get all open pull requests with the delay-48h label
            try:
                pulls = repo.get_pulls(state='open', sort='created', direction='desc')
                processed_count = 0
                failed_count = 0
                
                for pr in pulls:
                    try:
                        # Check if PR has the delay-48h label
                        labels = [label.name for label in pr.labels]
                        if 'delay-48h' not in labels:
                            continue
                        
                        # Check if PR is older than 48 hours
                        created_at = pr.created_at
                        now = datetime.now(created_at.tzinfo)
                        age_hours = (now - created_at).total_seconds() / 3600
                        
                        if age_hours < 48:
                            logger.info(f"PR #{pr.number} is only {age_hours:.1f} hours old, skipping")
                            continue
                        
                        logger.info(f"Processing PR #{pr.number} (age: {age_hours:.1f} hours)")
                        
                        # Retry logic for mergeable status check
                        max_retries = 3
                        mergeable = None
                        
                        for attempt in range(max_retries):
                            try:
                                if pr.mergeable is None:
                                    pr.update()
                                mergeable = pr.mergeable
                                break
                            except Exception as retry_error:
                                logger.warning(f"Retry {attempt + 1}/{max_retries} for PR #{pr.number} mergeable check: {retry_error}")
                                if attempt < max_retries - 1:
                                    time.sleep(2)  # Wait 2 seconds between retries
                                else:
                            logger.error(f"Failed to check mergeable status for PR #{pr.number} after {max_retries} attempts")
                            failed_count += 1
                            continue
                        
                        if mergeable:
                            # No conflicts, merge the PR
                            logger.info(f"Merging PR #{pr.number} - no conflicts detected")
                            
                            try:
                                pr.merge(
                                    commit_title=f"Auto-merge delayed PR #{pr.number}",
                                    commit_message=f"Auto-merged after 48-hour delay period\n\nThis PR was automatically merged after completing the required 48-hour contemplation period as requested by the Autonomous Living Nexus.",
                                    merge_method='merge'
                                )
                                
                                # Add comment about the merge
                                pr.create_issue_comment(
                                    f"**Auto-merged after 48-hour delay**\n\n"
                                    f"This pull request was automatically merged after completing the required 48-hour contemplation period. "
                                    f"The merge was successful with no conflicts detected.\n\n"
                                    f"*Processed by Autonomous Living Nexus - {datetime.now().isoformat()}*"
                                )
                                
                                logger.info(f"Successfully merged PR #{pr.number}")
                                processed_count += 1
                                
                            except Exception as merge_error:
                                logger.error(f"Failed to merge PR #{pr.number}: {merge_error}")
                                failed_count += 1
                                continue
                                
                        else:
                            # Has conflicts, close the PR
                            logger.info(f"Closing PR #{pr.number} - conflicts detected")
                            
                            try:
                                pr.create_issue_comment(
                                    f"**Auto-closed due to conflicts**\n\n"
                                    f"This pull request was automatically closed after the 48-hour delay period because merge conflicts were detected. "
                                    f"Please resolve the conflicts and create a new pull request if this evolution is still desired.\n\n"
                                    f"*Processed by Autonomous Living Nexus - {datetime.now().isoformat()}*"
                                )
                                
                                pr.edit(state='closed')
                                logger.info(f"Successfully closed PR #{pr.number}")
                                processed_count += 1
                                
                            except Exception as close_error:
                                logger.error(f"Failed to close PR #{pr.number}: {close_error}")
                                failed_count += 1
                                continue
                        
                        # Remove the delay-48h label
                        try:
                            if 'delay-48h' in labels:
                                pr.remove_from_labels('delay-48h')
                                logger.info(f"Removed delay-48h label from PR #{pr.number}")
                        except Exception as label_error:
                            logger.warning(f"Failed to remove delay-48h label from PR #{pr.number}: {label_error}")
                        
                    except Exception as pr_error:
                        logger.error(f"Failed to process PR #{pr.number}: {pr_error}")
                        failed_count += 1
                        continue
                
                logger.info(f"PR processing completed: {processed_count} processed, {failed_count} failed")
                
                if failed_count > 0:
                    logger.warning(f"{failed_count} PRs failed to process - check logs for details")
                
            except Exception as e:
                logger.error(f"Failed to process delayed PRs: {e}")
                raise

        if __name__ == "__main__":
            handle_delayed_prs()
        EOF

    - name: Summary
      run: |
        echo "Delayed PR processing completed"
        echo "Check the logs above for details on processed pull requests"
