name: Autonomous Evolution

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      discussions: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}       # FIX: was secrets.AUTONOMOUS_PAT
          fetch-depth: 0                  # full history needed for branch creation

      - name: Configure git identity
        run: |
          git config user.email "nexus@autonomous.living"
          git config user.name  "The Living Nexus"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyGithub python-dateutil requests

      - name: Run Nexus Evolution
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PAT:               ${{ secrets.PAT }}          # FIX: was AUTONOMOUS_PAT
          GITHUB_REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER:  ${{ github.repository_owner }}
          REPOSITORY_NAME:   ${{ github.event.repository.name }}
        run: python evolve.py

      - name: Deploy Dashboard to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard